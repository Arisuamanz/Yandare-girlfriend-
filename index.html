<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maimy: The Kidnapping</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* BASE STYLES */
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Nunito', sans-serif; user-select: none; color: white; touch-action: manipulation; }
        
        /* SETUP SCREEN (MAIN MENU) */
        #setup-screen {
            position: absolute; inset: 0; z-index: 999; background: #0a0a0a; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px;
            background-image: radial-gradient(#1a1a1a 1px, transparent 1px); background-size: 20px 20px;
        }
        .btn-start { 
            background: linear-gradient(45deg, #ff4757, #ff6b81); color: white; padding: 18px 40px; 
            border-radius: 50px; font-weight: 900; letter-spacing: 2px;
            width: 80%; max-width: 300px; transition: 0.3s; box-shadow: 0 10px 25px rgba(255, 71, 87, 0.4);
            text-transform: uppercase; font-size: 1.1rem; cursor: pointer;
        }
        .menu-actions {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-top: 40px;
        }
        .btn-continue {
            background: linear-gradient(45deg, #2f3542, #57606f);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.45);
        }
        .lang-switch {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 12px;
        }
        .lang-btn {
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.06);
            color: #ddd;
            padding: 8px 12px;
            border-radius: 999px;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .lang-btn.active {
            color: #fff;
            border-color: #ff4757;
            background: rgba(255, 71, 87, 0.25);
            box-shadow: 0 0 14px rgba(255, 71, 87, 0.35);
        }
        .btn-start:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(255, 71, 87, 0.6); }
        .btn-start:active { transform: scale(0.95); }

        /* GAME STAGE (MOBILE VERTICAL FOCUS) */
        #game-stage { 
            position: relative; width: 100vw; height: 100vh; max-width: 500px; margin: 0 auto; 
            background: #000; box-shadow: 0 0 50px rgba(0,0,0,0.9); overflow: hidden; 
        }

        /* LAYERS Z-INDEX STRUCTURE */
        .layer-bg { z-index: 1; }
        .layer-fx { z-index: 5; pointer-events: none; }
        .layer-char { z-index: 10; pointer-events: none; }
        .layer-overlay { z-index: 20; pointer-events: none; } 
        .layer-ui { z-index: 50; pointer-events: none; } 

        /* LAYERS CSS */
        .absolute-fill { position: absolute; inset: 0; transition: all 0.5s ease; }
        
        #bg-layer { 
            background-size: cover; background-position: center; filter: brightness(0.6); 
            transform: scale(1); transition: transform 20s linear, filter 0.5s ease;
        }
        .ken-burns { transform: scale(1.15) !important; }

        /* ATMOSPHERE OVERLAYS */
        .vignette { position: absolute; inset: 0; background: radial-gradient(circle, transparent 40%, black 120%); z-index: 3; pointer-events: none; }
        .scanlines {
            position: absolute; inset: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px; z-index: 4; pointer-events: none; opacity: 0.5;
        }

        /* CHARACTER */
        #char-layer { 
            display: flex; align-items: flex-end; justify-content: center; 
            bottom: -20px; transition: transform 0.5s; 
            height: 90vh; 
        }
        .sprite { 
            height: 105%; max-width: none; object-fit: contain;
            transform-origin: bottom center;
            filter: drop-shadow(0 0 30px rgba(0,0,0,0.9));
            transition: filter 0.3s, opacity 0.5s;
            /* PENINGKATAN KUALITI IMEJ */
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
        }

        /* UI ELEMENTS */
        #ui-layer { padding: 15px; display: flex; flex-direction: column; justify-content: space-between; height: 100%; }

        /* HUD */
        .heart-meter { 
            pointer-events: auto; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(10px);
            padding: 8px 15px; border-radius: 50px; border: 1px solid rgba(255, 71, 87, 0.3);
            display: flex; align-items: center; gap: 10px; width: fit-content;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5); transition: transform 0.2s, visibility 0s;
            margin-top: 10px;
        }
        .heart-icon { color: #ff4757; font-size: 1.1rem; filter: drop-shadow(0 0 5px #ff4757); transition: transform 0.2s, filter 0.2s; }
        .bar-bg { width: 100px; height: 8px; background: #222; border-radius: 4px; overflow: hidden; border: 1px solid #444; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, #ff4757, #ff7e5f); width: 50%; transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); box-shadow: 0 0 10px #ff4757; }
        .hud-good { animation: hudGood 0.45s ease; border-color: rgba(46, 213, 115, 0.9) !important; }
        .hud-bad { animation: hudBad 0.45s ease; border-color: rgba(255, 71, 87, 0.95) !important; }
        .bar-surge { animation: barSurge 0.45s ease; }
        .bar-drain { animation: barDrain 0.45s ease; }
        .heart-beat { animation: heartBeatBurst 0.45s ease; }
        .heart-alert { animation: heartAlert 0.45s ease; }
        .hud-spark {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 80;
            animation: hudSpark 0.7s ease-out forwards;
        }
        .spark-good { background: #2ed573; box-shadow: 0 0 8px #2ed573; }
        .spark-bad { background: #ff4757; box-shadow: 0 0 8px #ff4757; }

        /* DIALOG BOX */
        .dialog-box { 
            pointer-events: auto; 
            background: rgba(15, 15, 18, 0.9); backdrop-filter: blur(10px);
            border-top: 3px solid #ff4757; border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 20px 15px; min-height: 140px; margin-bottom: 5px; 
            cursor: pointer; position: relative; border-radius: 12px;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.8);
            transition: transform 0.1s;
        }
        .dialog-box:active { transform: scale(0.98); }
        .name-tag { 
            position: absolute; top: -14px; left: 20px; 
            background: linear-gradient(45deg, #ff4757, #d63031); color: white; 
            padding: 4px 16px; font-weight: 900; font-size: 0.85rem; 
            border-radius: 6px; transform: skew(-8deg);
            box-shadow: 3px 3px 0 rgba(0,0,0,0.4); text-transform: uppercase;
        }
        .dialog-text { font-size: 1rem; line-height: 1.5; color: #f1f1f1; text-shadow: 1px 1px 2px black; }
        .narrator-text { font-family: 'Special Elite', cursive; font-size: 1.1rem; color: #ccc; font-style: italic; text-align: center; margin-top: 25px; }

        /* CHOICES CONTAINER */
        .choices-wrapper { 
            pointer-events: auto; 
            display: flex; flex-direction: column; gap: 8px; 
            position: absolute; 
            bottom: 220px; 
            left: 50%; transform: translateX(-50%); 
            width: 90%; max-width: 400px; 
            z-index: 100;
        }
        .choice-btn { 
            background: rgba(20, 20, 25, 0.85); backdrop-filter: blur(10px); 
            color: #fff; padding: 14px 16px; border-radius: 10px; 
            font-weight: 700; text-align: left; border-left: 4px solid #555; 
            font-size: 0.95rem; transition: all 0.2s; position: relative; overflow: hidden; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); border-top: 1px solid rgba(255,255,255,0.05);
        }
        .choice-btn:active { background: #ff4757; color: white; transform: scale(0.97); }

        /* FEEDBACK POPUPS */
        .floating-text {
            position: absolute; font-weight: 900; font-size: 1.8rem; 
            pointer-events: none; z-index: 50; text-shadow: 0 2px 5px black;
            animation: floatUp 1s forwards;
        }
        .ft-good { color: #2ed573; }
        .ft-bad { color: #ff4757; }

        /* OVERLAYS & ANIMATIONS */
        #blackout { background: #000; opacity: 0; transition: opacity 2s; pointer-events: none; }
        #story-darken { background: #000; opacity: 0; transition: opacity 0.8s ease; pointer-events: none; }
        #blood-screen { background: #8a0303; mix-blend-mode: multiply; opacity: 0; transition: opacity 3s; pointer-events: none; }
        #end-msg { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); width: 100%; text-align: center; font-family: 'Special Elite', cursive; font-size: 3rem; color: #ff4757; opacity: 0; text-shadow: 0 0 15px black; pointer-events: none; transition: opacity 2s; }
        
        /* ENDING CONTINUE BUTTON */
        #update-msg { 
            position: absolute; top: 60%; left: 50%; transform: translate(-50%, -50%); width: 85%; text-align: center; 
            font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 1rem; color: #fff; opacity: 0; 
            text-shadow: 0 2px 5px black; pointer-events: none; transition: opacity 0.4s ease; z-index: 100; 
            background: rgba(0, 0, 0, 0.75); border: 1px solid #ff4757; padding: 12px; border-radius: 8px; backdrop-filter: blur(5px);
            cursor: pointer;
        }
        #restart-msg {
            position: absolute; top: 72%; left: 50%; transform: translate(-50%, -50%);
            font-family: 'Nunito', sans-serif; font-weight: 900; letter-spacing: 1px;
            background: linear-gradient(45deg, #ff4757, #ff6b81); color: #fff;
            border: 0; border-radius: 999px; padding: 12px 28px; cursor: pointer;
            opacity: 0; pointer-events: none; transition: opacity 0.35s ease; z-index: 110;
            box-shadow: 0 10px 25px rgba(255, 71, 87, 0.4);
        }
        #eye-open-overlay {
            position: absolute;
            inset: 0;
            z-index: 25;
            pointer-events: none;
            opacity: 1;
            display: none;
        }
        .eye-lid {
            position: absolute;
            left: 0;
            width: 100%;
            height: 52%;
            background: #000;
            transition: transform 1.8s cubic-bezier(0.2, 0.75, 0.2, 1);
        }
        .eye-lid.top {
            top: 0;
            transform: translateY(0);
        }
        .eye-lid.bottom {
            bottom: 0;
            transform: translateY(0);
        }
        #eye-open-overlay.open .eye-lid.top { transform: translateY(-100%); }
        #eye-open-overlay.open .eye-lid.bottom { transform: translateY(100%); }
        #eye-open-overlay.hidden { opacity: 0; transition: opacity 0.35s ease; }

        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        .glitch-anim { animation: glitch 0.2s 2; }
        .pulse-red { animation: pulseRed 2s infinite; }
        .pop-in { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .yandere-mode { filter: contrast(1.5) sepia(0.5) hue-rotate(-50deg) brightness(0.6) !important; }

        @keyframes shake { 10%, 90% { transform: translate3d(-2px, 0, 0); } 20%, 80% { transform: translate3d(4px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-6px, 0, 0); } 40%, 60% { transform: translate3d(6px, 0, 0); } }
        @keyframes floatUp { 0% { opacity: 0; transform: translateY(20px) scale(0.5); } 20% { opacity: 1; transform: translateY(0) scale(1.2); } 100% { opacity: 0; transform: translateY(-50px) scale(1); } }
        @keyframes hudGood { 0% { transform: scale(1); box-shadow: 0 4px 20px rgba(0,0,0,0.5); } 50% { transform: scale(1.08); box-shadow: 0 0 25px rgba(46, 213, 115, 0.55); } 100% { transform: scale(1); box-shadow: 0 4px 20px rgba(0,0,0,0.5); } }
        @keyframes hudBad { 0% { transform: translateX(0); } 25% { transform: translateX(-4px); } 50% { transform: translateX(4px); } 75% { transform: translateX(-2px); } 100% { transform: translateX(0); } }
        @keyframes barSurge { 0% { filter: brightness(1); } 50% { filter: brightness(1.65); } 100% { filter: brightness(1); } }
        @keyframes barDrain { 0% { filter: brightness(1); } 50% { filter: brightness(0.55); } 100% { filter: brightness(1); } }
        @keyframes heartBeatBurst { 0% { transform: scale(1); } 40% { transform: scale(1.35); } 100% { transform: scale(1); } }
        @keyframes heartAlert { 0% { transform: rotate(0deg); } 25% { transform: rotate(-12deg) scale(1.1); } 50% { transform: rotate(12deg) scale(1.1); } 75% { transform: rotate(-8deg); } 100% { transform: rotate(0deg); } }
        @keyframes hudSpark { 0% { opacity: 1; transform: translate(0, 0) scale(1); } 100% { opacity: 0; transform: translate(var(--dx, 0px), var(--dy, -20px)) scale(0.2); } }
        @keyframes glitch { 0% { transform: translate(0); } 20% { transform: translate(-5px, 5px); filter: hue-rotate(90deg); } 40% { transform: translate(-5px, -5px); } 60% { transform: translate(5px, 5px); } 80% { transform: translate(5px, -5px); } 100% { transform: translate(0); } }
        @keyframes pulseRed { 0% { box-shadow: inset 0 0 0 rgba(255,0,0,0); } 50% { box-shadow: inset 0 0 60px rgba(255,0,0,0.6); } 100% { box-shadow: inset 0 0 0 rgba(255,0,0,0); } }
        @keyframes popIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

<!-- SETUP SCREEN / MAIN MENU -->
<div id="setup-screen">
    <div class="max-w-md w-full m-auto text-center px-4">
        <h1 class="text-5xl text-red-500 font-black mb-1 tracking-tighter drop-shadow-lg" style="font-family: 'Special Elite', cursive;">MAIMY</h1>
        <h2 class="text-xl text-white font-bold tracking-widest mb-8">KIDNAPPED</h2>
        <p class="text-xs text-gray-500 mb-8 max-w-xs mx-auto">Warning: This game contains psychological horror themes.</p>
        <div class="lang-switch">
            <button id="lang-ms" class="lang-btn" onclick="setLanguage('ms')">Bahasa Melayu</button>
            <button id="lang-en" class="lang-btn" onclick="setLanguage('en')">English</button>
        </div>
        <div class="menu-actions">
            <button id="btn-start" class="btn-start" onclick="initGame()">Start Episode</button>
            <button id="btn-continue" class="btn-start btn-continue" onclick="continueGame()" style="display:none;">CONTINUE</button>
        </div>
    </div>
</div>

<!-- GAME STAGE -->
<div id="game-stage">
    <!-- Layer 1: Background -->
    <div id="bg-layer" class="absolute-fill layer-bg"></div>
    
    <!-- Layer 2: Atmosphere -->
    <div class="absolute-fill layer-fx" style="background: radial-gradient(circle, transparent 50%, black 120%); z-index: 5;"></div>
    <div class="scanlines layer-fx"></div>
    <div class="vignette layer-fx"></div>
    
    <!-- Layer 3: Character -->
    <div id="char-layer" class="absolute-fill layer-char">
        <img id="char-sprite" class="sprite" src="" alt="Character">
    </div>

    <!-- Layer 4: Overlays -->
    <div id="blackout" class="absolute-fill layer-overlay"></div>
    <div id="story-darken" class="absolute-fill layer-overlay"></div>
    <div id="blood-screen" class="absolute-fill layer-overlay"></div>
    <div id="end-msg" class="layer-overlay font-bold">END</div>
    <div id="update-msg" class="layer-overlay" onclick="next(true)">CONTINUE STORY</div>
    <button id="restart-msg" onclick="restartGame()">RESTART</button>
    <div id="eye-open-overlay">
        <div class="eye-lid top"></div>
        <div class="eye-lid bottom"></div>
    </div>

    <!-- Layer 5: UI -->
    <div id="ui-layer" class="absolute-fill layer-ui">
        <!-- HUD -->
        <div class="heart-meter pop-in" id="hud">
            <span class="heart-icon animate-pulse">❤</span>
            <div class="bar-bg"><div id="bar" class="bar-fill"></div></div>
            <span id="pct" class="font-mono text-xs font-bold text-gray-300">50%</span>
        </div>

        <!-- Choices -->
        <div id="choices" class="choices-wrapper hidden"></div>

        <!-- Dialog Box -->
        <div id="dialog" class="dialog-box pop-in" onclick="next()">
            <div id="name" class="name-tag">NAMA</div>
            <p id="text" class="dialog-text">...</p>
            <div class="text-right text-[10px] text-gray-500 mt-3 animate-bounce uppercase tracking-widest">Tap to continue</div>
        </div>
    </div>
</div>

<script src="./language.ms.js"></script>
<script src="./language.en.js"></script>
<script>
    // ==========================================
    // ASSETS DB (GAMBAR DIRECT LINK)
    // ==========================================
    const assets = {
        street: 'https://i.postimg.cc/MTKZPHg5/Senjabackground.jpg',
        room: 'https://i.postimg.cc/JzszcTgr/Bedroom.jpg',
        normal: 'https://i.postimg.cc/DwRyCrkZ/Maimy-normal.png',
        killer: 'https://i.postimg.cc/bvqqrdYh/Maimy-Killyou.png',
        angry: 'https://i.postimg.cc/NjKj7NVf/Maimy-angry.png',
        blush: 'https://i.postimg.cc/SsX02hVQ/Maimy-blushh.png',
        bat: 'https://i.postimg.cc/G2B08Czt/Maimy-bat.png',
        shh: 'https://i.postimg.cc/NMyh9cb5/Maimy-shh.png',
        lookPsyko: 'https://i.postimg.cc/8zxPyRQc/Maimy-look-Psyko.png',
        sad: 'https://i.postimg.cc/JzS4TNVz/Maimy-sad.png',
        serious: 'https://i.postimg.cc/9QsFxd5C/Maimy-serious.png',
        smile: 'https://i.postimg.cc/P5C5z6ct/Maimy-smile.png'
    };

    let state = { node: 'intro_walk', aff: 0.5 };
    const SAVE_KEY = 'maimy_story_save_v1';
    const CHECKPOINT_KEY = 'maimy_story_checkpoint_v1';
    const LANGUAGE_KEY = 'maimy_story_lang_v1';
    const LANGUAGE_FILES = {
        ms: { global: 'languageMs' },
        en: { global: 'languageEn' }
    };
    let assetPreloadPromise = null;
    let currentLanguage = getLocalStorageItem(LANGUAGE_KEY) || 'ms';
    if (!LANGUAGE_FILES[currentLanguage]) currentLanguage = 'ms';

    let story = {};
    let storyLoadedLanguage = null;
    let audioCtx = null;

    function getLocalStorageItem(key) {
        try { return localStorage.getItem(key); } catch (_) { return null; }
    }

    function ensureAudioReady() {
        try {
            if (!audioCtx) {
                const Ctx = window.AudioContext || window.webkitAudioContext;
                if (!Ctx) return false;
                audioCtx = new Ctx();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            return true;
        } catch (_) {
            return false;
        }
    }

    function playTone(freq, duration, type = 'sine', gainLevel = 0.03, delay = 0) {
        if (!ensureAudioReady()) return;
        const now = audioCtx.currentTime + delay;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, now);
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(gainLevel, now + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + duration + 0.02);
    }

    function playSfx(type) {
        if (!ensureAudioReady()) return;
        if (type === 'start') {
            playTone(392, 0.12, 'triangle', 0.025, 0);
            playTone(523, 0.15, 'triangle', 0.022, 0.08);
        } else if (type === 'choice_good') {
            playTone(523, 0.1, 'sine', 0.028, 0);
            playTone(659, 0.12, 'sine', 0.026, 0.07);
        } else if (type === 'choice_bad') {
            playTone(280, 0.12, 'sawtooth', 0.026, 0);
            playTone(220, 0.16, 'sawtooth', 0.024, 0.06);
        } else if (type === 'choice_neutral') {
            playTone(460, 0.08, 'triangle', 0.02, 0);
        } else if (type === 'continue') {
            playTone(349, 0.09, 'triangle', 0.02, 0);
            playTone(440, 0.1, 'triangle', 0.02, 0.06);
        } else if (type === 'blocked') {
            playTone(180, 0.07, 'square', 0.02, 0);
        } else if (type === 'death') {
            playTone(180, 0.2, 'sawtooth', 0.03, 0);
            playTone(140, 0.25, 'sawtooth', 0.028, 0.12);
        }
    }

    function setLocalStorageItem(key, value) {
        try { localStorage.setItem(key, value); } catch (_) {}
    }

    function refreshContinueButton() {
        const btn = document.getElementById('btn-continue');
        if (!btn) return;
        const hasSave = !!getLocalStorageItem(SAVE_KEY) || !!getLocalStorageItem(CHECKPOINT_KEY);
        btn.style.display = hasSave ? 'block' : 'none';
    }

    function updateLanguageButtons() {
        const msBtn = document.getElementById('lang-ms');
        const enBtn = document.getElementById('lang-en');
        if (!msBtn || !enBtn) return;
        msBtn.classList.toggle('active', currentLanguage === 'ms');
        enBtn.classList.toggle('active', currentLanguage === 'en');
    }

    function setLanguage(lang) {
        if (!LANGUAGE_FILES[lang]) return;
        currentLanguage = lang;
        setLocalStorageItem(LANGUAGE_KEY, lang);
        story = {};
        storyLoadedLanguage = null;
        updateLanguageButtons();
    }

    function cloneStoryData(src) {
        return JSON.parse(JSON.stringify(src || {}));
    }

    function setMenuLoadingState(isLoading) {
        const startBtn = document.getElementById('btn-start');
        const continueBtn = document.getElementById('btn-continue');
        if (!startBtn || !continueBtn) return;

        if (isLoading) {
            startBtn.disabled = true;
            continueBtn.disabled = true;
            startBtn.dataset.originalText = startBtn.dataset.originalText || startBtn.innerText;
            continueBtn.dataset.originalText = continueBtn.dataset.originalText || continueBtn.innerText;
            startBtn.innerText = 'Loading Assets...';
            if (continueBtn.style.display !== 'none') continueBtn.innerText = 'Loading Assets...';
            startBtn.style.opacity = '0.75';
            continueBtn.style.opacity = '0.75';
            startBtn.style.cursor = 'wait';
            continueBtn.style.cursor = 'wait';
            return;
        }

        startBtn.disabled = false;
        continueBtn.disabled = false;
        if (startBtn.dataset.originalText) startBtn.innerText = startBtn.dataset.originalText;
        if (continueBtn.dataset.originalText) continueBtn.innerText = continueBtn.dataset.originalText;
        startBtn.style.opacity = '';
        continueBtn.style.opacity = '';
        startBtn.style.cursor = '';
        continueBtn.style.cursor = '';
    }

    function preloadImage(url) {
        return new Promise((resolve) => {
            if (!url) {
                resolve();
                return;
            }
            const img = new Image();
            img.decoding = 'async';
            img.onload = () => resolve();
            img.onerror = () => resolve();
            img.src = url;
        });
    }

    async function preloadAssetsOnce() {
        if (assetPreloadPromise) return assetPreloadPromise;
        const urls = [...new Set(Object.values(assets).filter((v) => typeof v === 'string' && v.startsWith('http')))];
        assetPreloadPromise = Promise.all(urls.map(preloadImage));
        return assetPreloadPromise;
    }

    function buildStoryForLanguage(lang) {
        const msBase = window.languageMs && window.languageMs.story;
        if (!msBase) return null;

        // Gunakan BM sebagai sumber struktur story (next/choices/special/bg),
        // kemudian hanya timpa teks untuk bahasa terpilih.
        const output = cloneStoryData(msBase);
        if (lang === 'ms') return output;

        const cfg = LANGUAGE_FILES[lang];
        const localized = cfg && window[cfg.global] && window[cfg.global].story;
        if (!localized) return output;

        Object.keys(output).forEach((nodeId) => {
            const baseNode = output[nodeId];
            const langNode = localized[nodeId];
            if (!baseNode || !langNode) return;

            if (typeof langNode.text === 'string') baseNode.text = langNode.text;
            if (typeof langNode.name === 'string') baseNode.name = langNode.name;
            if (Array.isArray(baseNode.choices) && Array.isArray(langNode.choices)) {
                baseNode.choices.forEach((choice, i) => {
                    if (langNode.choices[i] && typeof langNode.choices[i].text === 'string') {
                        choice.text = langNode.choices[i].text;
                    }
                });
            }
        });

        return output;
    }

    function saveProgress(nodeId) {
        const payload = {
            node: nodeId || state.node,
            aff: state.aff,
            savedAt: Date.now()
        };
        setLocalStorageItem(SAVE_KEY, JSON.stringify(payload));
        refreshContinueButton();
    }

    function saveCheckpoint(nodeId) {
        setLocalStorageItem(CHECKPOINT_KEY, nodeId);
        saveProgress(nodeId);
    }

    function readSavedProgress() {
        const raw = getLocalStorageItem(SAVE_KEY);
        if (!raw) return null;
        try {
            const parsed = JSON.parse(raw);
            if (!parsed || typeof parsed.node !== 'string') return null;
            return parsed;
        } catch (_) {
            return null;
        }
    }

    function spawnHudSparks(isGood) {
        const hud = document.getElementById('hud');
        const ui = document.getElementById('ui-layer');
        if (!hud || !ui) return;
        const hudRect = hud.getBoundingClientRect();
        const uiRect = ui.getBoundingClientRect();
        const baseX = hudRect.left - uiRect.left + 20;
        const baseY = hudRect.top - uiRect.top + hudRect.height / 2;
        for (let i = 0; i < 7; i++) {
            const dot = document.createElement('span');
            dot.className = `hud-spark ${isGood ? 'spark-good' : 'spark-bad'}`;
            dot.style.left = `${baseX + Math.random() * 70}px`;
            dot.style.top = `${baseY + (Math.random() * 8 - 4)}px`;
            dot.style.setProperty('--dx', `${(Math.random() * 60 - 30).toFixed(1)}px`);
            dot.style.setProperty('--dy', `${(-20 - Math.random() * 35).toFixed(1)}px`);
            ui.appendChild(dot);
            setTimeout(() => dot.remove(), 700);
        }
    }

    function animateLoveHud(delta) {
        const hud = document.getElementById('hud');
        const bar = document.getElementById('bar');
        const heart = document.querySelector('.heart-icon');
        if (!hud || !bar || !heart) return;

        hud.classList.remove('hud-good', 'hud-bad');
        bar.classList.remove('bar-surge', 'bar-drain');
        heart.classList.remove('heart-beat', 'heart-alert');
        void hud.offsetWidth;

        if (delta > 0) {
            hud.classList.add('hud-good');
            bar.classList.add('bar-surge');
            heart.classList.add('heart-beat');
            spawnHudSparks(true);
        } else if (delta < 0) {
            hud.classList.add('hud-bad');
            bar.classList.add('bar-drain');
            heart.classList.add('heart-alert');
            spawnHudSparks(false);
        }

        setTimeout(() => {
            hud.classList.remove('hud-good', 'hud-bad');
            bar.classList.remove('bar-surge', 'bar-drain');
            heart.classList.remove('heart-beat', 'heart-alert');
        }, 500);
    }

    function resetSceneForPlay() {
        document.getElementById('blood-screen').style.opacity = 0;
        document.getElementById('end-msg').style.opacity = 0;
        document.getElementById('update-msg').style.opacity = 0;
        document.getElementById('update-msg').style.pointerEvents = 'none';
        document.getElementById('story-darken').style.opacity = 0;
        document.getElementById('restart-msg').style.opacity = 0;
        document.getElementById('restart-msg').style.pointerEvents = 'none';
        document.getElementById('dialog').style.display = 'block';
        document.getElementById('hud').style.visibility = 'visible';
        document.getElementById('game-stage').classList.remove('shake');
        document.getElementById('game-stage').classList.remove('pulse-red');

        const eyeOverlay = document.getElementById('eye-open-overlay');
        eyeOverlay.style.display = 'none';
        eyeOverlay.classList.remove('open', 'hidden');
    }

    function showRestartButton(delay = 0) {
        setTimeout(() => {
            const restartBtn = document.getElementById('restart-msg');
            restartBtn.innerText = currentLanguage === 'en' ? 'RESTART' : 'MULA SEMULA';
            restartBtn.style.opacity = 1;
            restartBtn.style.pointerEvents = 'auto';
        }, delay);
    }

    function restartGame() {
        playSfx('continue');
        resetSceneForPlay();
        state.aff = 0.5;
        render('intro_walk');
        updateBar();
    }

    function applyWakeupDarkness(nodeId, node) {
        const darkLayer = document.getElementById('story-darken');
        const bgLayer = document.getElementById('bg-layer');
        const isWakeupScene = nodeId === 'wakeup_room';
        darkLayer.style.opacity = isWakeupScene ? 0.5 : 0;
        if (isWakeupScene && !node.bg) {
            bgLayer.style.backgroundImage = 'radial-gradient(circle at 50% 35%, #18181b 0%, #050507 70%, #000 100%)';
        }
    }

    function playEyeOpenPov() {
        const eyeOverlay = document.getElementById('eye-open-overlay');
        eyeOverlay.style.display = 'block';
        eyeOverlay.classList.remove('open', 'hidden');

        requestAnimationFrame(() => {
            requestAnimationFrame(() => {
                eyeOverlay.classList.add('open');
            });
        });

        setTimeout(() => {
            eyeOverlay.classList.add('hidden');
        }, 1700);

        setTimeout(() => {
            eyeOverlay.style.display = 'none';
            eyeOverlay.classList.remove('open', 'hidden');
        }, 2200);
    }

    async function ensureStoryLoaded() {
        if (Object.keys(story).length > 0 && storyLoadedLanguage === currentLanguage) return true;
        const builtStory = buildStoryForLanguage(currentLanguage);
        if (builtStory) {
            story = builtStory;
            storyLoadedLanguage = currentLanguage;
            return true;
        }
        document.getElementById('text').innerText = 'Ralat: fail language tidak dijumpai.';
        return false;
    }

    // ENGINE
    async function initGame() {
        setMenuLoadingState(true);
        await preloadAssetsOnce();
        const loaded = await ensureStoryLoaded();
        if (!loaded) {
            setMenuLoadingState(false);
            return;
        }
        ensureAudioReady();
        playSfx('start');

        resetSceneForPlay();
        state.aff = 0.5;
        document.getElementById('setup-screen').style.display = 'none';
        setMenuLoadingState(false);
        render('intro_walk');
        updateBar();
    }

    async function continueGame() {
        setMenuLoadingState(true);
        await preloadAssetsOnce();
        const loaded = await ensureStoryLoaded();
        if (!loaded) {
            setMenuLoadingState(false);
            return;
        }
        ensureAudioReady();
        playSfx('continue');

        resetSceneForPlay();
        document.getElementById('setup-screen').style.display = 'none';
        setMenuLoadingState(false);

        const checkpointNode = getLocalStorageItem(CHECKPOINT_KEY);
        if (checkpointNode && story[checkpointNode]) {
            const saved = readSavedProgress();
            state.aff = (saved && typeof saved.aff === 'number') ? saved.aff : 0.5;
            render(checkpointNode);
            updateBar();
            return;
        }

        const saved = readSavedProgress();
        if (saved && story[saved.node]) {
            state.aff = (typeof saved.aff === 'number') ? saved.aff : 0.5;
            render(saved.node);
            updateBar();
            return;
        }

        state.aff = 0.5;
        render('intro_walk');
        updateBar();
    }

    function render(id) {
        const node = story[id];
        if(!node) return;
        state.node = id;
        applyWakeupDarkness(id, node);

        // ANIMATE BG (Slow Zoom)
        const bgLayer = document.getElementById('bg-layer');
        bgLayer.classList.remove('ken-burns');
        void bgLayer.offsetWidth; // Trigger reflow
        bgLayer.classList.add('ken-burns');

        // EFFECTS & OVERLAYS
        const blackout = document.getElementById('blackout');
        if(node.special === 'blackout') {
            blackout.style.opacity = 1;
        } else if(node.special === 'fadein') {
            blackout.style.opacity = 0;
            setTimeout(() => { if(node.special==='fadein') blackout.style.display = 'none'; }, 2000);
        } else {
             blackout.style.display = 'none';
        }
        
        if(node.special === 'die') { killSequence(); return; }

        saveProgress(id);
        if (node.next === 'day_3_start') {
            saveCheckpoint(id);
        }

        // UPDATE BACKGROUND URLS FROM ASSETS DB
        if(node.bg === 'street') bgLayer.style.backgroundImage = `url('${assets.street}')`;
        if(node.bg === 'room') bgLayer.style.backgroundImage = `url('${assets.room}')`;

        // UPDATE SPRITE URLS FROM ASSETS DB
        const charImg = document.getElementById('char-sprite');
        const spriteUrl = node.sprite ? assets[node.sprite] : null;
        if(spriteUrl) {
            charImg.src = spriteUrl;
            charImg.style.opacity = 1;
            if (node.sprite === 'killer') {
                charImg.classList.add('yandere-mode');
            } else {
                charImg.classList.remove('yandere-mode');
            }
        } else {
            charImg.style.opacity = 0;
            charImg.classList.remove('yandere-mode');
        }

        if (id === 'maimy_enter') {
            playEyeOpenPov();
        }

        // TEXT & UI
        const nameTag = document.getElementById('name');
        const txt = document.getElementById('text');
        const choices = document.getElementById('choices');
        const dialogBox = document.getElementById('dialog');
        
        choices.classList.add('hidden');
        choices.innerHTML = '';
        dialogBox.classList.remove('pop-in');
        void dialogBox.offsetWidth;
        dialogBox.classList.add('pop-in');

        if(node.narrator) {
            nameTag.style.display = 'none';
            txt.className = 'narrator-text';
            txt.innerText = node.text;
        } else {
            nameTag.style.display = 'block';
            nameTag.innerText = node.name || "MAIMY";
            txt.className = 'dialog-text';
            txt.innerText = node.text;
        }

        // CHOICES GENERATION
        if(node.choices) {
            document.querySelector('.animate-bounce').style.display = 'none';
            node.choices.forEach((c, index) => {
                const btn = document.createElement('div');
                btn.className = 'choice-btn pop-in';
                btn.style.animationDelay = `${index * 0.1}s`;
                btn.innerText = c.text;
                
                // Mobile Touch Handling
                btn.addEventListener('click', (e) => { 
                    e.stopPropagation(); 
                    e.preventDefault(); 
                    makeChoice(c); 
                });
                
                choices.appendChild(btn);
            });
            choices.classList.remove('hidden');
        } else {
            document.querySelector('.animate-bounce').style.display = 'block';
        }

        // TUNJUK BUTANG CONTINUE UNTUK SAMBUNG DAY 3
        const shouldShowEndingContinue = !node.choices && node.next === 'day_3_start';
        if(shouldShowEndingContinue) {
            document.querySelector('.animate-bounce').style.display = 'none';
            setTimeout(() => {
                const continueBtn = document.getElementById('update-msg');
                continueBtn.style.opacity = 1;
                continueBtn.style.pointerEvents = 'auto';
            }, 800);
        } else {
            const continueBtn = document.getElementById('update-msg');
            continueBtn.style.opacity = 0;
            continueBtn.style.pointerEvents = 'none';
        }

        const isTerminalEnding = !node.choices && !node.next && node.special !== 'die';
        if (isTerminalEnding) {
            showRestartButton(500);
        }
    }

    function makeChoice(c) {
        state.aff += c.delta;
        animateLoveHud(c.delta);
        if (c.delta > 0) {
            playSfx('choice_good');
        } else if (c.delta < 0) {
            playSfx('choice_bad');
        } else {
            playSfx('choice_neutral');
        }
        updateBar();
        showFeedback(c.delta);

        if(state.aff <= 0.01) { // Floating point safeguard
            killSequence();
        } else {
            if(c.next) render(c.next);
        }
    }

    // VISUAL FEEDBACK
    function showFeedback(delta) {
        const hud = document.getElementById('hud');
        const el = document.createElement('div');
        el.className = `floating-text ${delta >= 0 ? 'ft-good' : 'ft-bad'}`;

        const rect = hud.getBoundingClientRect();
        el.style.left = `${rect.right + 10}px`;
        el.style.top = `${rect.top}px`;

        if (delta > 0) {
            el.innerText = '+LOVE';
        } else if (delta < 0) {
            el.innerText = '-LOVE';
            document.getElementById('game-stage').classList.add('shake');
            document.getElementById('char-sprite').classList.add('glitch-anim');
            setTimeout(() => {
                document.getElementById('game-stage').classList.remove('shake');
                document.getElementById('char-sprite').classList.remove('glitch-anim');
            }, 500);
        } else {
            el.innerText = 'OK';
        }

        document.getElementById('ui-layer').appendChild(el);
        setTimeout(() => el.remove(), 1000);
    }

    function updateBar() {
        const pct = Math.max(0, Math.min(100, Math.round(state.aff * 100)));
        document.getElementById('bar').style.width = pct + '%';
        document.getElementById('pct').innerText = pct + '%';
        
        const bar = document.getElementById('bar');
        const container = document.getElementById('hud');
        
        if(pct > 50) {
            bar.style.background = 'linear-gradient(90deg, #ff4757, #ff7e5f)';
            container.style.borderColor = 'rgba(255, 71, 87, 0.5)';
            document.getElementById('game-stage').classList.remove('pulse-red');
        } else {
            bar.style.background = '#e84118';
            container.style.borderColor = '#e84118';
            if(pct < 30) document.getElementById('game-stage').classList.add('pulse-red');
        }
    }

    function killSequence() {
        playSfx('death');
        const charImg = document.getElementById('char-sprite');
        charImg.src = assets.killer; 
        charImg.style.opacity = 1;
        charImg.classList.add('yandere-mode');

        document.getElementById('game-stage').classList.add('shake');
        document.getElementById('choices').classList.add('hidden');
        
        document.getElementById('hud').style.visibility = 'hidden';
        
        const txt = document.getElementById('text');
        const name = document.getElementById('name');
        name.style.display = 'block';
        name.innerText = "MAIMY";
        txt.className = 'dialog-text';
        txt.style.color = '#ff4757';
        txt.style.fontWeight = '900';
        txt.style.fontSize = '1.3rem';
        txt.innerHTML = currentLanguage === 'en'
            ? "DARLING, YOU WON'T LISTEN??<br>IF THAT'S HOW IT IS...<br>SLEEP FOREVER!!!"
            : "SAYANG TAK NAK DENGAR CAKAP??<br>KALAU MACAM TU...<br>TIDURLAH SELAMANYA!!!";

        setTimeout(() => {
            document.getElementById('blood-screen').style.opacity = 1;
            document.getElementById('end-msg').style.opacity = 1;
            document.getElementById('update-msg').style.opacity = 0; // PASTIKAN TIDAK MUNCUL KETIKA MATI
            document.getElementById('update-msg').style.pointerEvents = 'none';
            document.getElementById('dialog').style.display = 'none';
            document.getElementById('end-msg').innerText = "TAMAT";
            showRestartButton(250);
        }, 2000);
    }

    function next(force = false) {
        const node = story[state.node];
        const requiresManualContinue = node && node.next === 'day_3_start';
        if (requiresManualContinue && !force) {
            playSfx('blocked');
            return;
        }
        if(!node.choices && node.special !== 'die' && node.next) {
            playSfx(force ? 'continue' : 'choice_neutral');
            render(node.next);
        }
    }

    // Key Listener
    document.addEventListener('keydown', (e) => {
        if(e.code === 'Space' || e.code === 'Enter') {
            next();
        }
    });

    refreshContinueButton();
    updateLanguageButtons();
</script>
